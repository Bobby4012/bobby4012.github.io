<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobby Wenzel | Blue Compass RV</title>
<style>
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg, #eef4fb 0%, #d7e6f5 100%);
    color: #081b33;
  }
  .wrap {
    max-width: 460px;
    margin: 0 auto;
    padding: 20px 14px 34px;
  }
  .business-card {
    width: 100%;
    display: block;
    border-radius: 18px;
    box-shadow: 0 12px 28px rgba(0,0,0,.18);
    margin-bottom: 18px;
  }
  .panel {
    background: linear-gradient(180deg, #062645 0%, #02172c 100%);
    border-radius: 22px;
    padding: 22px 18px 24px;
    text-align: center;
    color: white;
    box-shadow: 0 14px 34px rgba(0,0,0,.22);
  }
  .headshot {
    width: 138px;
    height: 138px;
    object-fit: cover;
    object-position: center 22%;
    border-radius: 50%;
    border: 5px solid white;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
  }
  h1 {
    font-size: 31px;
    letter-spacing: .8px;
    margin: 16px 0 4px;
    line-height: 1.05;
  }
  .role {
    color: #1da7ff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 18px;
  }
  .btn {
    display: block;
    width: 100%;
    border-radius: 13px;
    padding: 15px 12px;
    margin: 10px 0;
    text-decoration: none;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: .3px;
  }
  .save {
    background: linear-gradient(180deg, #ffd52d 0%, #f3b900 100%);
    color: #06172b;
  }
  .blue {
    background: linear-gradient(180deg, #0d66c8 0%, #064a99 100%);
    color: white;
  }
  .outline {
    border: 1px solid rgba(255,255,255,.42);
    color: white;
    background: rgba(255,255,255,.04);
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .grid .btn {
    margin: 0;
  }
  .divider {
    margin: 22px 0 14px;
    color: rgba(255,255,255,.68);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .address {
    background: rgba(255,255,255,.07);
    border-radius: 15px;
    padding: 14px;
    margin-top: 16px;
    color: rgba(255,255,255,.88);
    line-height: 1.45;
    font-size: 14px;
  }
  .footer {
    margin-top: 18px;
    color: rgba(255,255,255,.70);
    font-size: 15px;
  }
</style>
</head>
